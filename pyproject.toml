[build-system]
requires = ["setuptools>=68", "setuptools-scm>=10.0.5"]
build-backend = "setuptools.build_meta"

[project]
name = "orchestrator"
dynamic = ["version"]
description = "Local-first agent orchestrator (Phase 1 skeleton)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "CC-BY-NC-SA-4.0" }
authors = [{ name = "skgandikota" }]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
]
dependencies = [
    "psutil>=7.2.2",
    "pydantic>=2",
    "structlog>=24",
    "httpx>=0.28.1",
    "selectolax>=0.3.21",
    "duckduckgo-search>=6.0",
    "mcp>=1.0,<2",
    "pyyaml>=6.0",
    "jsonschema>=4.26.0",
]

[project.scripts]
orchestrator = "orchestrator.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=5",
    "ruff>=0.6",
    "mypy>=1.10",
    "respx>=0.21",
    "pre-commit>=3.7",
]
browser = [
    "playwright>=1.40",
]
otel = [
    "opentelemetry-api>=1.25",
    "opentelemetry-sdk>=1.25",
    "opentelemetry-exporter-otlp-proto-http>=1.25",
]

[project.urls]
Homepage = "https://github.com/skgandikota/orchestrator"
Issues = "https://github.com/skgandikota/orchestrator/issues"
Source = "https://github.com/skgandikota/orchestrator"

[tool.setuptools.packages.find]
include = ["orchestrator*"]
exclude = ["tests*"]

[tool.setuptools.package-data]
orchestrator = ["config/*.toml"]

[tool.setuptools_scm]
fallback_version = "0.1.0.dev0"

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [".github/scripts"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "W", "SIM", "RUF"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
no_implicit_optional = true
exclude = [
    "tests/",
    "\\.github/scripts/",
    "build/",
    "dist/",
]

[[tool.mypy.overrides]]
module = [
    "duckduckgo_search.*",
    "selectolax.*",
    "psutil.*",
    "respx.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"

[tool.coverage.run]
source = ["orchestrator"]
branch = true
omit = [
    "orchestrator/tools/_browser_worker.py",
    "orchestrator/tools/browser.py",
]

[tool.coverage.report]
fail_under = 95
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "\\.\\.\\.",
]
