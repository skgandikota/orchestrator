name: release-image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: build (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: slim
            image: coracle
            dockerfile: Dockerfile
          - variant: browser
            image: coracle-browser
            dockerfile: Dockerfile.browser
    outputs:
      slim-digest: ${{ steps.export.outputs.slim-digest }}
      browser-digest: ${{ steps.export.outputs.browser-digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch,enable=${{ github.ref == format('refs/heads/{0}', 'main') }},value=edge
            type=semver,pattern={{raw}}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
          provenance: true
          sbom: true

      - name: Export digest
        id: export
        run: echo "${{ matrix.variant }}-digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  verify:
    name: verify multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=edge" >> "$GITHUB_OUTPUT"
          fi

      - name: Inspect slim manifest (amd64 + arm64 present)
        run: |
          set -euo pipefail
          IMAGE="${REGISTRY}/${OWNER}/coracle:${{ steps.tag.outputs.tag }}"
          echo "Inspecting ${IMAGE}"
          docker buildx imagetools inspect "${IMAGE}" | tee inspect.txt
          grep -q "linux/amd64" inspect.txt
          grep -q "linux/arm64" inspect.txt

      - name: Inspect browser manifest (amd64 + arm64 present)
        run: |
          set -euo pipefail
          IMAGE="${REGISTRY}/${OWNER}/coracle-browser:${{ steps.tag.outputs.tag }}"
          echo "Inspecting ${IMAGE}"
          docker buildx imagetools inspect "${IMAGE}" | tee inspect-browser.txt
          grep -q "linux/amd64" inspect-browser.txt
          grep -q "linux/arm64" inspect-browser.txt

      - name: Smoke-test slim image (native arch)
        run: |
          set -euo pipefail
          IMAGE="${REGISTRY}/${OWNER}/coracle:${{ steps.tag.outputs.tag }}"
          docker pull "${IMAGE}"
          docker run --rm --entrypoint python "${IMAGE}" -c "import coracle; print('coracle import OK')"

  create-draft-release:
    name: create draft GitHub release
    runs-on: ubuntu-latest
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve tag and prerelease flag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [[ "${TAG}" == *-draft ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: true
          prerelease: ${{ steps.tag.outputs.prerelease }}
          generate_release_notes: true
          body: |
            Automated draft release for `${{ steps.tag.outputs.tag }}`.

            **Published images** (multi-arch: linux/amd64, linux/arm64):
            - `ghcr.io/${{ github.repository_owner }}/coracle:${{ steps.tag.outputs.tag }}`
            - `ghcr.io/${{ github.repository_owner }}/coracle-browser:${{ steps.tag.outputs.tag }}`

            This release is in **Draft** state. Edit and publish manually once
            verified. Tags ending in `-draft` are also marked as **prerelease**.
