name: PR Reviewer Bot

# Strict, isolated PR reviewer that runs as a GitHub App.
# Has zero project-level context beyond the diff + acceptance criteria
# fetched from the linked issue. Approves + merges + deletes branch only
# when every check passes.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SKGANDIKOTA_APPID            — GitHub App ID (numeric)
#   SKGANDIKOTA_INSTALLATIONID   — App installation ID for skgandikota/orchestrator
#   SKGANDIKOTA_PRIVATEKEY       — App private key (PEM, full multiline)
#
# The App must have these repository permissions:
#   contents: write       (for merge + branch delete)
#   pull_requests: write  (for review + comments)
#   issues: read          (to fetch acceptance criteria from linked issue)
#   metadata: read

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  pull_request_review:
    types: [submitted, edited, dismissed]
  issue_comment:
    types: [created]
  check_run:
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
        type: number

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-review-${{ github.event.pull_request.number || github.event.check_run.pull_requests[0].number || github.event.issue.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_target' && github.event.pull_request.draft != true && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'pull_request_review' && github.event.pull_request.draft != true && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) ||
      (github.event_name == 'check_run' && github.event.check_run.pull_requests[0] != null)
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "num=${{ inputs.pr_number }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "check_run" ]; then
            echo "num=${{ github.event.check_run.pull_requests[0].number }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "num=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          else
            echo "num=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout reviewer script (from main)
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Mint App installation token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SKGANDIKOTA_APPID }}
          private-key: ${{ secrets.SKGANDIKOTA_PRIVATEKEY }}
          owner: skgandikota
          repositories: orchestrator

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install reviewer deps
        run: pip install --quiet requests pyyaml

      - name: Run strict reviewer
        env:
          GITHUB_TOKEN: ${{ steps.app.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.num }}
          REPO: skgandikota/orchestrator
        run: python .github/scripts/pr_reviewer.py
