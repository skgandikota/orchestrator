# Default orchestrator settings.
# Any value can be overridden via env var ORCHESTRATOR__<SECTION>__<KEY>.

[ram]
soft_cap_mb = 7000
hard_cap_mb = 5000
poll_interval_s = 1.0

[scheduler]
max_concurrent_steps = 2
checkpoint_every_step = true
acquire_timeout_s = 120.0
min_free_mb_for_load = 5500

[ollama]
base_url = "http://127.0.0.1:11434"
request_timeout_seconds = 120
request_timeout_s = 120.0
keep_alive = "24h"
reasoning_model = "qwen2.5:7b"
coder_model = "qwen2.5-coder:7b"

[logging]
level = "INFO"
json = false

[state]
db_path = "./orchestrator.db"

[status]
# Mode B narrator (issue #14). Off by default. When enabled, a small
# qwen2.5:1.5b model is held resident OUTSIDE the single-slot scheduler;
# this adds ~1GB of resident RAM, so reduce the scheduler RAM budget
# accordingly.
narrator_enabled = false
narrator_model = "qwen2.5:1.5b"
narrator_max_tokens = 80

[tools.fs]
# Sandbox root for every filesystem tool. Override with
# ORCHESTRATOR__TOOLS__FS__WORKSPACE_ROOT.
workspace_root = "~/orchestrator-workspace"

[tools.shell]
# Empty allow-list means "permit anything not denied". Populate to harden.
allow = []
deny = ["rm", "rmdir", "sudo", "su", "mv", "dd", "mkfs", "shutdown", "reboot", "kill", "killall", "chown", "chmod"]

[tools.web]
user_agent = "orchestrator-bot/0.1 (+https://github.com/skgandikota/orchestrator)"
allow_private = false

# Big-AI providers (Phase 2).
# Real keys come from env vars (GEMINI_API_KEY, GROQ_API_KEY, OLLAMA_CLOUD_API_KEY)
# which override anything written here. Daily quotas are tracked in-process.
[providers]
order = ["gemini", "groq", "ollama_cloud"]

[providers.gemini]
litellm_model = "gemini/gemini-1.5-pro"
api_key = ""
daily_quota = 1500

[providers.groq]
litellm_model = "groq/llama-3.3-70b-versatile"
api_key = ""
daily_quota = 14400

[providers.ollama_cloud]
litellm_model = "ollama/llama3.1"
api_key = ""
base_url = "https://ollama.com"
daily_quota = 10000
